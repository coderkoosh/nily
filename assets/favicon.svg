<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="12" fill="#1d242b"/>
  <!-- hammare: huvud uppe till höger, skaft ner åt vänster -->
  <g transform="rotate(45 32 32)" fill="#f0a028">
    <rect x="28.75" y="18" width="6.5" height="35" rx="3"/>
    <rect x="19" y="8.5" width="26" height="10.5" rx="4"/>
  </g>
  <!-- skiftnyckel: öppna käftar uppe till vänster och nere till höger -->
  <g transform="rotate(-45 32 32)">
    <g fill="#f0a028">
      <rect x="28.5" y="12" width="7" height="40"/>
      <circle cx="32" cy="11.5" r="9"/>
      <circle cx="32" cy="52.5" r="9"/>
    </g>
    <g fill="#1d242b">
      <rect x="27.5" y="0" width="9" height="11.5"/>
      <rect x="27.5" y="52.5" width="9" height="11.5"/>
    </g>
  </g>
</svg>
